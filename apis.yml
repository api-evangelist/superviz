- aid: superviz:superviz-meetings-api
  name: SuperViz Meetings API
  tags:
  - Video
  - Meetings
  - Huddle
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/video-sdk/webhooks/meeting-stats
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/video-sdk/webhooks/meeting-stats
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Retrieves video meeting (huddle) statistics - duration, minutes, price,
    recordings, and per-participant join detail - for meetings created with the
    Video SDK.
- aid: superviz:superviz-webhooks-api
  name: SuperViz Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/video-sdk/webhooks/meeting-stats
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/video-sdk/webhooks/meeting-stats
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  - url: asyncapi/superviz-asyncapi.yml
    type: AsyncAPI
  description: Outbound webhook notifications SuperViz POSTs to a preconfigured receiver
    when events occur - meeting stats available (MEETING_STATS), recording ready,
    and transcription ready. Modeled as AsyncAPI event messages.
- aid: superviz:superviz-authentication-api
  name: SuperViz Authentication API
  tags:
  - Authentication
  - Keys
  - Tokens
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/getting-started/setting-up-your-account
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/getting-started/setting-up-your-account
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Credential model for SuperViz - a developer key initializes the client
    SDK, while a Client ID plus Secret Key pair (from Dashboard > Developer > Keys)
    authenticates all server-side REST requests via client_id and secret headers.
