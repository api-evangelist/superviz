aid: superviz
url: https://raw.githubusercontent.com/api-evangelist/superviz/refs/heads/main/apis.yml
name: SuperViz
kind: company
description: SuperViz provides real-time collaboration and data-synchronization infrastructure
  for web applications - presence, realtime data channels, video huddle/meetings,
  contextual comments, and mouse pointers. The product is SDK-first (@superviz/sdk
  and @superviz/react-sdk initialized with a developer key), supported by a REST API
  at api.superviz.com for participants, presence, channels, rooms, comments, and
  meetings, an event-driven realtime channel API, and webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Real Time
- Collaboration
- Presence
- Synchronization
- Video
- WebRTC
- SDK
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: superviz:superviz-participants-api
  name: SuperViz Participants API
  tags:
  - Participants
  - Presence
  - Real Time
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/realtime/1.0/rest-api/presence
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/realtime/1.0/rest-api/presence
    type: Documentation
  - url: https://docs.superviz.com/realtime/1.0/rest-api/presence
    type: APIReference
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Server-side REST endpoint that returns the list of participants currently
    connected to a given realtime channel, authenticated with the client_id and
    secret developer keys.
- aid: superviz:superviz-channels-api
  name: SuperViz Channels API
  tags:
  - Channels
  - Real Time
  - Presence
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/realtime/1.0/rest-api/channels
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/realtime/1.0/rest-api/channels
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Lists the realtime channels active for a room, used to introspect where
    presence and messages are flowing across a collaborative application.
- aid: superviz:superviz-realtime-data-api
  name: SuperViz Realtime Data API
  tags:
  - Real Time
  - Events
  - Pub Sub
  - Synchronization
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/realtime/1.0/rest-api/publish-message-to-channel
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/realtime/1.0/rest-api/publish-message-to-channel
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  - url: asyncapi/superviz-asyncapi.yml
    type: AsyncAPI
  description: Publish (post) events with an arbitrary JSON payload to a named realtime
    channel from a backend, so servers can push synchronized data to connected SDK
    clients. The channel/event model is described as AsyncAPI alongside the REST
    publish endpoint.
- aid: superviz:superviz-rooms-api
  name: SuperViz Rooms API
  tags:
  - Rooms
  - Collaboration
  - Participants
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/collaboration/rest-api/how-to-use
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/collaboration/rest-api/how-to-use
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Collaboration REST surface for rooms - retrieve a room's participants
    and related collaboration context, with cursor-style pagination on list responses.
- aid: superviz:superviz-comments-api
  name: SuperViz Contextual Comments API
  tags:
  - Comments
  - Annotations
  - Collaboration
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.superviz.com/collaboration/rest-api/how-to-use
  baseURL: https://api.superviz.com
  properties:
  - url: https://docs.superviz.com/collaboration/rest-api/how-to-use
    type: Documentation
  - url: openapi/superviz-openapi.yml
    type: OpenAPI
  description: Reads the contextual comments (annotations pinned to elements of a web
    app or 3D scene) created through the Collaboration SDK, exposed server-side over
