principles:
- name: Visibility
  description: Track MAU, realtime message volume, and video/recording minutes from the SuperViz dashboard.
- name: Allocation
  description: Tag rooms / channels per feature or team; map connection and message burn to cost centers.
- name: Optimization
  description: Scope channels tightly and batch realtime updates to cut message volume; enable recording and AI insights only where needed.
- name: Accountability
  description: Assign owners per application; review MAU and video minutes monthly against the plan allowance and budget.
