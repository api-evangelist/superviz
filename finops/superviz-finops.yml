description: >-
  FinOps view of SuperViz spend. SuperViz bills a tiered subscription (Free /
  Pro / Enterprise) plus usage-based metering across monthly active users /
  concurrent connections, realtime messages, video meeting participant-minutes,
  and recording minutes. AI meeting insights and recording add per-minute
  charges on paid tiers. Because the platform is SDK-first, the main cost
  drivers are how many users connect, how chatty the realtime channels are, and
  how much video / recording is produced.
notes: >-
  Specific unit prices are not published in this artifact; verify against the
  SuperViz pricing page during reconciliation.
